version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: predlab
      POSTGRES_PASSWORD: predlab
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: polymarket,kalshi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  polymarket-sim:
    build:
      context: ./polymarket-sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql+psycopg2://predlab:predlab@postgres:5432/polymarket
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  kalshi-sim:
    build:
      context: ./kalshi-sim
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - DATABASE_URL=postgresql+psycopg2://predlab:predlab@postgres:5432/kalshi
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data: