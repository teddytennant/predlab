services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: predlab
      POSTGRES_PASSWORD: predlab
      POSTGRES_DB: postgres
      POSTGRES_MULTIPLE_DATABASES: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predlab"]
      interval: 10s
      timeout: 5s
      retries: 5

  polymarket-sim:
    build:
      context: ./polymarket-sim
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - DATABASE_URL=postgresql+psycopg2://predlab:predlab@postgres:5432/polymarket
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - ADMIN_SECRET=${ADMIN_SECRET:-change-me-set-in-dotenv}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # python:slim has no curl; urlopen raises (non-zero exit) on failure
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  leaderboard:
    build:
      context: ./leaderboard-rs
    ports:
      - "8003:8003"
    environment:
      - BIND=0.0.0.0:8003
      # Reach the sim over the internal compose network (no TLS, no Cloudflare).
      - POLY_URL=http://polymarket-sim:8001
      - PREDLAB_ADMIN_SECRET=${ADMIN_SECRET:-change-me-set-in-dotenv}
      # Staff/seed accounts hidden from the public board (comma-separated).
      - EXCLUDE_USERS=${LEADERBOARD_EXCLUDE:-club_admin,demo_trader}
    depends_on:
      - polymarket-sim
    restart: unless-stopped

volumes:
  postgres_data: