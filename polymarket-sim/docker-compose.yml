# Local-dev stack: just the sim + Postgres.
# The full club deployment (sim + leaderboard site) is the repo-root docker-compose.yml.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket_sim
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket_sim"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql+psycopg2://polymarket:polymarket@db:5432/polymarket_sim
      - ENVIRONMENT=development
      - SYNC_INTERVAL_SECONDS=30
      # Override in .env for local tweaks
    volumes:
      - .:/app  # dev: live reload
    command: >
      sh -c "pip install -e '.[dev]' --quiet &&
             uvicorn polymarket_sim.main:app --host 0.0.0.0 --port 8001 --reload"

volumes:
  pgdata:
