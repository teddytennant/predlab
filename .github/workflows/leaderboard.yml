name: Update leaderboard

on:
  schedule:
    - cron: "0 * * * *"   # hourly (GitHub may delay; this is best-effort)
  workflow_dispatch: {}    # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: leaderboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate leaderboard from live API
        env:
          PREDLAB_ADMIN_SECRET: ${{ secrets.PREDLAB_ADMIN_SECRET }}
          PREDLAB_KALSHI_SECRET: ${{ secrets.PREDLAB_KALSHI_SECRET }}
        run: python scripts/gen_leaderboard.py

      - name: Commit if standings changed
        run: |
          if git diff --quiet -- README.md; then
            echo "No leaderboard change."
          else
            git config user.name "Teddy Tennant"
            git config user.email "teddytennant@icloud.com"
            git add README.md
            git commit -m "chore: refresh leaderboard"
            git push
          fi
