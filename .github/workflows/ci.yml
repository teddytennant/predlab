name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  simulators:
    name: ${{ matrix.sim }} (pytest + ruff)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sim: [polymarket-sim]
    defaults:
      run:
        working-directory: ${{ matrix.sim }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Test
        run: pytest -q

  admin:
    name: ratatui-admin (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ratatui-admin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ratatui-admin
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  gui:
    name: predlab-gui (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: predlab-gui
    steps:
      - uses: actions/checkout@v4
      - name: Install eframe build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings

  leaderboard:
    name: leaderboard-rs (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leaderboard-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: leaderboard-rs
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings
