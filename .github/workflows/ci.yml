name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  sim:
    name: polymarket-sim (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: polymarket-sim
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Test
        run: pytest -q

  # All workspace crates (predlab-gui, predlab-util, ratatui-admin) in one job.
  workspace:
    name: cargo workspace (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install eframe build deps (predlab-gui)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  leaderboard:
    name: leaderboard-rs (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: leaderboard-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: leaderboard-rs
      - name: Test
        run: cargo test
      - name: Clippy
        run: cargo clippy -- -D warnings
